---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version-file: '.php-version'
          extensions: mbstring, xml, ctype, iconv, intl, json
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader

      - name: Run tests
        run: composer test

      - name: Run linting
        run: composer lint

      - name: Get tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          # Extract changelog section for this version
          if [ -f CHANGELOG.md ]; then
            # Get content between this version and next version header
            awk -v tag="$TAG_NAME" '$0 ~ "^## \\[" tag "\\]"{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > /tmp/changelog.txt
            # Fall back to the Unreleased section when no version-specific header exists
            if [ ! -s /tmp/changelog.txt ]; then
              awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > /tmp/changelog.txt
            fi
            if [ -s /tmp/changelog.txt ]; then
              {
                echo "content<<EOF"
                cat /tmp/changelog.txt
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
            else
              echo "content=Release $TAG_NAME" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "content=Release $TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive source code
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          mkdir -p release
          composer archive --format=zip --dir=release --file="monolog-gdpr-filter-$TAG_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: ./release/monolog-gdpr-filter-${{ steps.tag.outputs.name }}.zip
