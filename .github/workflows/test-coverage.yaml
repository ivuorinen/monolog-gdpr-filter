---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test & Coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          coverage: pcov
          php-version-file: '.php-version'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure matchers
        uses: mheap/phpunit-matcher-action@dcbd4ead41890163b65d0b21534387ce72980ee5 # v1.4.0

      - name: Run Tests (teamcity format)
        shell: bash
        run: composer test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage.xml

      - name: Code Coverage Summary Report
        id: coverage-summary
        uses: saschanowak/CloverCodeCoverageSummary@74291a4a2e8b848605aae10d27adbe7d17aa71e5 # 1.1.1
        with:
          filename: coverage.xml

      - name: "Add Code Coverage to Job Summary"
        run: |
          cat code-coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          cat code-coverage-details.md >> "$GITHUB_STEP_SUMMARY"

      - name: "Add Code Coverage Summary as PR Comment"
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-summary.md
