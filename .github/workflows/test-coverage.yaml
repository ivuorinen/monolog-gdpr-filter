---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test & Coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          coverage: pcov
          php-version-file: '.php-version'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure matchers
        uses: mheap/phpunit-matcher-action@dcbd4ead41890163b65d0b21534387ce72980ee5 # v1.4.0

      - name: Run Tests (teamcity format)
        shell: bash
        run: composer test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml

      - name: Code Coverage Summary Report
        id: coverage-summary
        uses: saschanowak/CloverCodeCoverageSummary@74291a4a2e8b848605aae10d27adbe7d17aa71e5 # 1.1.1
        with:
          filename: coverage.xml

      - name: "Add Code Coverage to Job Summary"
        run: |
          cat code-coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          cat code-coverage-details.md >> "$GITHUB_STEP_SUMMARY"

      - name: "Add Code Coverage Summary as PR Comment"
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-summary.md
